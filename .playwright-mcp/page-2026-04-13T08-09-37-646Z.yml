                  - paragraph [ref=e1682]: "As of March 19, 2026, these manifest permissions are the main Google Play policy risk for this app:"
                  - list [ref=e1683]:
                    - listitem [ref=e1684]:
                      - code [ref=e1685]: READ_SMS
                    - listitem [ref=e1686]:
                      - code [ref=e1687]: SEND_SMS
                    - listitem [ref=e1688]:
                      - code [ref=e1689]: READ_CALL_LOG
                  - paragraph [ref=e1690]: "Why these matter:"
                  - list [ref=e1691]:
                    - listitem [ref=e1692]: Google Play treats SMS and Call Log access as highly restricted. In most cases, Play only allows them for the default SMS app, default Phone app, default Assistant, or a narrow policy exception.
                    - listitem [ref=e1693]:
                      - text: Review usually involves a
                      - code [ref=e1694]: Permissions Declaration Form
                      - text: ", policy justification, and demo video evidence in Play Console."
                    - listitem [ref=e1695]: If we want a Play-safe build, these should be the first permissions removed behind a dedicated product flavor / variant.
                  - paragraph [ref=e1696]: "Current OpenClaw Android implication:"
                  - list [ref=e1697]:
                    - listitem [ref=e1698]: APK / sideload build can keep SMS and Call Log features.
                    - listitem [ref=e1699]: Google Play build should exclude SMS send/search and Call Log search unless the product is intentionally positioned and approved as a default-handler exception case.
                    - listitem [ref=e1700]:
                      - text: "The repo now ships this split as Android product flavors:"
                      - list [ref=e1701]:
                        - listitem [ref=e1702]:
                          - code [ref=e1703]: play
                          - text: ": removes"
                          - code [ref=e1704]: READ_SMS
                          - text: ","
                          - code [ref=e1705]: SEND_SMS
                          - text: ", and"
                          - code [ref=e1706]: READ_CALL_LOG
                          - text: ", and hides SMS / Call Log surfaces in onboarding, settings, and advertised node capabilities."
                        - listitem [ref=e1707]:
                          - code [ref=e1708]: thirdParty
                          - text: ": keeps the full permission set and the existing SMS / Call Log functionality."
                  - paragraph [ref=e1709]: "Policy links:"
